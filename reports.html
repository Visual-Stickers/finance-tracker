<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="js/theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Finance Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    .report-kpi {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .kpi-label { font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px; }
    .kpi-value { font-size:20px;font-weight:700; }
    @media(max-width:1000px){ .report-kpi{ grid-template-columns:repeat(3,1fr); } }
    @media(max-width:600px) { .report-kpi{ grid-template-columns:repeat(2,1fr); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Range selector -->
<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px">
  <div class="tabs" id="rangeTabs">
    <button class="tab-btn" data-range="daily">Daily</button>
    <button class="tab-btn active" data-range="monthly">Monthly</button>
    <button class="tab-btn" data-range="yearly">Yearly</button>
    <button class="tab-btn" data-range="custom">Custom</button>
  </div>
  <div class="date-bar" id="customRange" style="display:none">
    <input type="date" class="form-control" id="dateFrom">
    <span style="color:var(--text2)">to</span>
    <input type="date" class="form-control" id="dateTo">
    <button class="btn btn-primary btn-sm" onclick="load()">Apply</button>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div id="rangeLabel" style="font-size:13px;font-weight:600;color:var(--text2)"></div>
    <button class="btn btn-primary btn-sm" id="exportPdfBtn"><i class="fa-solid fa-file-pdf"></i>&nbsp; Export PDF</button>
  </div>
</div>

<!-- KPIs -->
<div class="report-kpi" id="kpiRow"></div>

<!-- Charts row 1 -->
<div class="grid-2" style="margin-bottom:16px">
  <div class="card card-pad">
    <div class="section-title" style="margin-bottom:14px">Income vs Expenses</div>
    <div class="chart-box"><canvas id="ieChart"></canvas></div>
  </div>
  <div class="card card-pad">
    <div class="section-title" style="margin-bottom:14px">Net Savings Trend</div>
    <div class="chart-box"><canvas id="savingsChart"></canvas></div>
  </div>
</div>

<!-- Charts row 2 -->
<div class="grid-2" style="margin-bottom:16px">
  <div class="card card-pad">
    <div class="section-title" style="margin-bottom:14px">Expense by Category</div>
    <div class="chart-box"><canvas id="catChart" style="max-height:240px"></canvas></div>
  </div>
  <div class="card card-pad">
    <div class="section-title" style="margin-bottom:14px">Income by Category</div>
    <div class="chart-box"><canvas id="incCatChart" style="max-height:240px"></canvas></div>
  </div>
</div>

<!-- Detail tables -->
<div class="grid-2">
  <div>
    <div class="section-title" style="margin-bottom:10px">Top Expenses</div>
    <div class="table-wrap" id="topExpTable"></div>
  </div>
  <div>
    <div class="section-title" style="margin-bottom:10px">Income Breakdown</div>
    <div class="table-wrap" id="incBreakTable"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script>

const chartTextColor = getComputedStyle(document.documentElement).getPropertyValue('--text2').trim();
const chartGridColor = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
Chart.defaults.color = chartTextColor;
Chart.defaults.borderColor = chartGridColor;

let activeRange = 'monthly';
let charts = {};
let dateFrom, dateTo;
let lastReport = null; // holds the most recently loaded report data, used by PDF export

// Set default dates
const now = new Date();
dateFrom = U.monthStart(now);
dateTo   = U.monthEnd(now);

// NOTE: this must live at top level (not nested inside the bottom IIFE) —
// load() calls it directly, and a function declared inside another function
// is only visible inside that function, which was the cause of the
// "applyRange is not defined" error.
function applyRange(range) {
  const now = new Date();
  if (range === 'daily')   { dateFrom = U.today(); dateTo = U.today(); }
  if (range === 'monthly') { dateFrom = U.monthStart(now); dateTo = U.monthEnd(now); }
  if (range === 'yearly')  { dateFrom = U.yearStart(now);  dateTo = U.yearEnd(now); }
}

async function load() {
  if (activeRange !== 'custom') applyRange(activeRange);
  document.getElementById('kpiRow').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px"><i class="fa-solid fa-spinner fa-spin" style="font-size:20px;color:var(--text3)"></i></div>';

  const label = activeRange === 'daily' ? `Today — ${U.fmtDate(U.today())}`
    : activeRange === 'monthly' ? U.monthLabel(dateFrom)
    : activeRange === 'yearly'  ? new Date().getFullYear() + ' Full Year'
    : `${U.fmtDate(dateFrom)} → ${U.fmtDate(dateTo)}`;
  document.getElementById('rangeLabel').textContent = label;

  const [incRows, expRows, loans, cards] = await Promise.all([
    db.select('income',       `date=gte.${dateFrom}&date=lte.${dateTo}&order=date.desc`),
    db.select('expenses',     `date=gte.${dateFrom}&date=lte.${dateTo}&order=date.desc`),
    db.select('loans',        'select=outstanding,emi'),
    db.select('credit_cards', 'select=outstanding,credit_limit'),
  ]);

  const totalInc  = incRows.reduce((s,r) => s + +r.amount, 0);
  const totalExp  = expRows.reduce((s,r) => s + +r.amount, 0);
  const savings   = totalInc - totalExp;
  const loanOS    = loans.reduce((s,l) => s + +l.outstanding, 0);
  const ccOS      = cards.reduce((s,c) => s + +c.outstanding, 0);
  const savingsPct = totalInc ? ((savings/totalInc)*100).toFixed(1) : 0;

  renderKPIs(totalInc, totalExp, savings, savingsPct, loanOS + ccOS);

  // Category maps
  const expCats = {}, incCats = {};
  expRows.forEach(r => { expCats[r.category] = (expCats[r.category]||0) + +r.amount; });
  incRows.forEach(r => { incCats[r.category] = (incCats[r.category]||0) + +r.amount; });

  renderCharts(incRows, expRows, incCats, expCats, totalInc, totalExp, savings);
  renderTables(expRows, incCats);

  // Keep everything this render used, so Export PDF always reflects exactly
  // what's on screen (same range, same charts, same underlying rows).
  lastReport = {
    label, dateFrom, dateTo,
    incRows, expRows, incCats, expCats,
    totalInc, totalExp, savings, savingsPct,
    loanOS, ccOS, totalDebt: loanOS + ccOS
  };
}

function renderKPIs(inc, exp, sav, savPct, debt) {
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="kpi-label">Total Income</div><div class="kpi-value" style="color:var(--green)">${U.inr(inc)}</div></div>
    <div class="kpi"><div class="kpi-label">Total Expenses</div><div class="kpi-value" style="color:var(--red)">${U.inr(exp)}</div></div>
    <div class="kpi"><div class="kpi-label">Net Savings</div><div class="kpi-value" style="color:${sav>=0?'var(--green)':'var(--red)'}">${U.inr(sav)}</div></div>
    <div class="kpi"><div class="kpi-label">Savings Rate</div><div class="kpi-value" style="color:var(--blue)">${savPct}%</div></div>
    <div class="kpi"><div class="kpi-label">Total Debt</div><div class="kpi-value" style="color:var(--orange)">${U.inr(debt)}</div></div>`;
}

function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function renderCharts(incRows, expRows, incCats, expCats, totalInc, totalExp, savings) {
  const COLORS = ['#007aff','#34c759','#ff3b30','#ff9500','#af52de','#5ac8fa','#ff2d55','#ffcc00','#00b4d8'];

  // IE bar chart — group by day/week/month depending on range
  destroyChart('ie'); destroyChart('sav'); destroyChart('cat'); destroyChart('inccat');

  // Build time-series for IE chart
  const ieMap = {};
  [...incRows.map(r=>({...r,_t:'inc'})), ...expRows.map(r=>({...r,_t:'exp'}))].forEach(r => {
    const key = activeRange === 'daily' ? r.date
      : activeRange === 'yearly' ? r.date.slice(0,7)
      : r.date;
    if (!ieMap[key]) ieMap[key] = {inc:0, exp:0};
    ieMap[key][r._t === 'inc' ? 'inc' : 'exp'] += +r.amount;
  });
  const ieKeys = Object.keys(ieMap).sort();
  const ieLabels = ieKeys.map(k => {
    if (activeRange === 'yearly') return U.monthLabel(k+'-01');
    return U.fmtDate(k);
  });

  charts['ie'] = new Chart(document.getElementById('ieChart'), {
    type: 'bar',
    data: { labels: ieLabels.length ? ieLabels : ['No data'],
      datasets: [
        { label:'Income',  data: ieKeys.map(k=>ieMap[k].inc), backgroundColor:'rgba(52,199,89,.75)', borderRadius:5, borderSkipped:false },
        { label:'Expense', data: ieKeys.map(k=>ieMap[k].exp), backgroundColor:'rgba(255,59,48,.70)', borderRadius:5, borderSkipped:false },
      ]},
    options: chartOpts()
  });

  // Savings line
  let running = 0;
  const savData = ieKeys.map(k => { running += ieMap[k].inc - ieMap[k].exp; return running; });
  charts['sav'] = new Chart(document.getElementById('savingsChart'), {
    type: 'line',
    data: { labels: ieLabels.length ? ieLabels : ['No data'],
      datasets: [{
        label:'Cumulative Savings', data: savData,
        borderColor:'#007aff', backgroundColor:'rgba(0,122,255,.08)',
        fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#007aff'
      }]},
    options: chartOpts()
  });

  // Expense doughnut
  const expLabels = Object.keys(expCats), expVals = expLabels.map(k=>expCats[k]);
  if (expLabels.length) {
    charts['cat'] = new Chart(document.getElementById('catChart'), {
      type:'doughnut',
      data: { labels:expLabels, datasets:[{ data:expVals, backgroundColor:COLORS, borderWidth:0, hoverOffset:4 }]},
      options: doughnutOpts()
    });
  } else {
    document.getElementById('catChart').parentElement.innerHTML = '<div class="empty"><p>No expense data</p></div>';
  }

  // Income doughnut
  const incLabels = Object.keys(incCats), incVals = incLabels.map(k=>incCats[k]);
  if (incLabels.length) {
    charts['inccat'] = new Chart(document.getElementById('incCatChart'), {
      type:'doughnut',
      data: { labels:incLabels, datasets:[{ data:incVals, backgroundColor:COLORS.slice().reverse(), borderWidth:0, hoverOffset:4 }]},
      options: doughnutOpts()
    });
  } else {
    document.getElementById('incCatChart').parentElement.innerHTML = '<div class="empty"><p>No income data</p></div>';
  }
}

function renderTables(expRows, incCats) {
  // Top 10 expenses
  const topExp = [...expRows].sort((a,b) => +b.amount - +a.amount).slice(0,10);
  document.getElementById('topExpTable').innerHTML = topExp.length ? `
    <table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th class="td-right">Amount</th></tr></thead>
    <tbody>${topExp.map(r=>`
      <tr><td>${U.fmtDate(r.date)}</td>
      <td><span class="badge badge-red">${r.category}</span></td>
      <td>${r.description||'—'}</td>
      <td class="td-right" style="font-weight:600;color:var(--red)">${U.inr(r.amount)}</td></tr>`).join('')}
    </tbody></table>`
    : '<div class="empty"><p>No expenses</p></div>';

  // Income breakdown by category
  const incEntries = Object.entries(incCats).sort((a,b)=>b[1]-a[1]);
  document.getElementById('incBreakTable').innerHTML = incEntries.length ? `
    <table><thead><tr><th>Category</th><th class="td-right">Amount</th></tr></thead>
    <tbody>${incEntries.map(([cat,amt])=>`
      <tr><td><span class="badge badge-green">${cat}</span></td>
      <td class="td-right" style="font-weight:600;color:var(--green)">${U.inr(amt)}</td></tr>`).join('')}
    </tbody></table>`
    : '<div class="empty"><p>No income</p></div>';
}

function chartOpts() {
  return {
    responsive:true, maintainAspectRatio:true,
    plugins: {
      legend: { labels:{ font:{size:11}, usePointStyle:true } },
      tooltip: { callbacks:{ label: c => ' '+U.inr(c.raw) } }
    },
    scales: {
      x: { grid:{ display:false }, ticks:{ font:{size:10}, maxRotation:45 } },
      y: { grid:{ color:chartGridColor }, ticks:{ font:{size:11}, callback: v => '₹'+(v>=1000?(v/1000).toFixed(0)+'k':v) } }
    }
  };
}

function doughnutOpts() {
  return {
    responsive:true, maintainAspectRatio:true, cutout:'60%',
    plugins: {
      legend: { position:'bottom', labels:{ font:{size:11}, padding:12, usePointStyle:true } },
      tooltip: { callbacks:{ label: c => ' '+U.inr(c.raw) } }
    }
  };
}

// ─── PDF Export ────────────────────────────────────────────────────────────
// Builds a colourful, professional PDF using the SAME chart images that are
// on screen (Chart.js canvases exported as PNG) plus the underlying data
// rows/tables behind them, using jsPDF + jspdf-autotable.
async function exportToPDF() {
  if (!lastReport) { U.toast('Report is still loading, try again in a moment', 'error'); return; }
  const btn = document.getElementById('exportPdfBtn');
  U.loading(btn, true);
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 32;
    const BLUE = [0,122,255], GREEN = [52,199,89], RED = [255,59,48], ORANGE = [255,149,0], DARK = [30,32,36], GREY = [110,116,128];

    const addFooter = () => {
      const n = doc.internal.getNumberOfPages();
      for (let i = 1; i <= n; i++) {
        doc.setPage(i);
        doc.setDrawColor(230,230,235);
        doc.line(margin, pageH-34, pageW-margin, pageH-34);
        doc.setFontSize(8); doc.setTextColor(...GREY); doc.setFont(undefined,'normal');
        doc.text('Finance Tracker — Financial Report', margin, pageH-22);
        doc.text(`Page ${i} of ${n}`, pageW-margin, pageH-22, { align: 'right' });
      }
    };

    // ── Header banner ──────────────────────────────────────────────────────
    doc.setFillColor(...BLUE);
    doc.rect(0, 0, pageW, 92, 'F');
    doc.setFillColor(0,90,200);
    doc.rect(0, 84, pageW, 8, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont(undefined, 'bold'); doc.setFontSize(22);
    doc.text('Finance Tracker', margin, 40);
    doc.setFontSize(12); doc.setFont(undefined, 'normal');
    doc.text('Financial Report', margin, 60);
    doc.setFontSize(9);
    doc.text(`Period: ${lastReport.label}   |   Generated: ${U.fmtDate(U.today())}`, margin, 78);

    // ── KPI cards ───────────────────────────────────────────────────────────
    let y = 118;
    const kpis = [
      { label:'Total Income',  value: U.inrPdf(lastReport.totalInc),  color: GREEN },
      { label:'Total Expenses',value: U.inrPdf(lastReport.totalExp),  color: RED },
      { label:'Net Savings',   value: U.inrPdf(lastReport.savings),   color: lastReport.savings>=0 ? GREEN : RED },
      { label:'Savings Rate',  value: `${lastReport.savingsPct}%`, color: BLUE },
      { label:'Total Debt',    value: U.inrPdf(lastReport.totalDebt), color: ORANGE },
    ];
    const kpiGap = 8;
    const kpiH = 62;
    const kpiW = (pageW - margin*2 - kpiGap*(kpis.length-1)) / kpis.length;
    kpis.forEach((k, i) => {
      const x = margin + i*(kpiW+kpiGap);
      doc.setFillColor(248,249,251);
      doc.roundedRect(x, y, kpiW, kpiH, 4, 4, 'F');
      doc.setFillColor(...k.color);
      doc.roundedRect(x, y, 4, kpiH, 2, 2, 'F');
      doc.setTextColor(...GREY); doc.setFontSize(7.2); doc.setFont(undefined,'bold');
      doc.text(k.label.toUpperCase(), x+9, y+17, { maxWidth: kpiW-14 });

      // Auto-shrink the value's font size so it always stays inside the
      // card — long rupee amounts were previously overflowing past the box.
      const maxValW = kpiW - 18;
      let fs = 12.5;
      doc.setFont(undefined, 'bold');
      doc.setFontSize(fs);
      while (fs > 7 && doc.getTextWidth(k.value) > maxValW) {
        fs -= 0.5;
        doc.setFontSize(fs);
      }
      doc.setTextColor(...k.color);
      doc.text(k.value, x+9, y+42);
    });
    y += kpiH + 26;

    // ── Charts (2x2 grid) — pulled straight from the live Chart.js canvases ─
    doc.setTextColor(...DARK); doc.setFontSize(13); doc.setFont(undefined,'bold');
    doc.text('Overview', margin, y);
    y += 14;

    const chartW = (pageW - margin*2 - 14) / 2;
    const chartH = 150;
    const chartDefs = [
      { id:'ie',     title:'Income vs Expenses' },
      { id:'sav',    title:'Net Savings Trend' },
      { id:'cat',    title:'Expense by Category' },
      { id:'inccat', title:'Income by Category' },
    ];
    chartDefs.forEach((c, i) => {
      const col = i % 2, row = Math.floor(i/2);
      const x = margin + col*(chartW+14);
      const cy = y + row*(chartH+14);
      doc.setFillColor(255,255,255);
      doc.setDrawColor(228,230,235);
      doc.roundedRect(x, cy, chartW, chartH, 5, 5, 'FD');
      doc.setTextColor(...DARK); doc.setFontSize(9); doc.setFont(undefined,'bold');
      doc.text(c.title, x+10, cy+16);
      if (charts[c.id]) {
        try {
          const img = charts[c.id].toBase64Image('image/png', 1);
          doc.addImage(img, 'PNG', x+8, cy+22, chartW-16, chartH-30, undefined, 'FAST');
        } catch (e) {
          doc.setFontSize(8); doc.setTextColor(...GREY);
          doc.text('Chart unavailable', x+10, cy+50);
        }
      } else {
        doc.setFontSize(8); doc.setTextColor(...GREY);
        doc.text('No data for this period', x+10, cy+50);
      }
    });

    // ── Underlying data tables (new page) ───────────────────────────────────
    doc.addPage();
    let ty = margin;
    doc.setTextColor(...DARK); doc.setFontSize(14); doc.setFont(undefined,'bold');
    doc.text('Underlying Data', margin, ty);

    // Income breakdown by category
    const incEntries = Object.entries(lastReport.incCats).sort((a,b)=>b[1]-a[1]);
    doc.autoTable({
      startY: ty + 20,
      margin: { left: margin, right: margin },
      head: [['Income Category', 'Amount']],
      body: incEntries.length ? incEntries.map(([cat,amt]) => [cat, U.inrPdf(amt)]) : [['No income recorded', '—']],
      theme: 'grid',
      headStyles: { fillColor: GREEN, textColor: 255, fontStyle: 'bold', fontSize: 9 },
      bodyStyles: { fontSize: 8.5, textColor: DARK },
      alternateRowStyles: { fillColor: [240,250,243] },
      columnStyles: { 1: { halign: 'right', fontStyle: 'bold', cellPadding: { top: 5, bottom: 5, left: 5, right: 8 } } },
    });

    // Expense breakdown by category
    const expEntries = Object.entries(lastReport.expCats).sort((a,b)=>b[1]-a[1]);
    doc.autoTable({
      startY: doc.lastAutoTable.finalY + 20,
      margin: { left: margin, right: margin },
      head: [['Expense Category', 'Amount']],
      body: expEntries.length ? expEntries.map(([cat,amt]) => [cat, U.inrPdf(amt)]) : [['No expenses recorded', '—']],
      theme: 'grid',
      headStyles: { fillColor: RED, textColor: 255, fontStyle: 'bold', fontSize: 9 },
      bodyStyles: { fontSize: 8.5, textColor: DARK },
      alternateRowStyles: { fillColor: [253,240,239] },
      columnStyles: { 1: { halign: 'right', fontStyle: 'bold', cellPadding: { top: 5, bottom: 5, left: 5, right: 8 } } },
    });

    // Full expense transaction list for the period
    doc.autoTable({
      startY: doc.lastAutoTable.finalY + 26,
      margin: { left: margin, right: margin },
      head: [['Date', 'Category', 'Description', 'Amount']],
      body: lastReport.expRows.length
        ? [...lastReport.expRows].sort((a,b)=>+b.amount-+a.amount)
            .map(r => [U.fmtDate(r.date), r.category, r.description || '—', U.inrPdf(r.amount)])
        : [['—','No expense transactions','—','—']],
      theme: 'striped',
      headStyles: { fillColor: ORANGE, textColor: 255, fontStyle: 'bold', fontSize: 9 },
      bodyStyles: { fontSize: 8 },
      columnStyles: { 3: { halign: 'right', fontStyle: 'bold', cellPadding: { top: 4, bottom: 4, left: 4, right: 8 } } },
      didParseCell: (data) => {
        if (data.section === 'head') return;
        if (data.column.index === 3) data.cell.styles.textColor = RED;
      },
    });

    // Full income transaction list for the period
    doc.autoTable({
      startY: doc.lastAutoTable.finalY + 26,
      margin: { left: margin, right: margin },
      head: [['Date', 'Category', 'Description', 'Amount']],
      body: lastReport.incRows.length
        ? [...lastReport.incRows].sort((a,b)=>+b.amount-+a.amount)
            .map(r => [U.fmtDate(r.date), r.category, r.description || '—', U.inrPdf(r.amount)])
        : [['—','No income transactions','—','—']],
      theme: 'striped',
      headStyles: { fillColor: GREEN, textColor: 255, fontStyle: 'bold', fontSize: 9 },
      bodyStyles: { fontSize: 8 },
      columnStyles: { 3: { halign: 'right', fontStyle: 'bold', cellPadding: { top: 4, bottom: 4, left: 4, right: 8 } } },
      didParseCell: (data) => {
        if (data.section === 'head') return;
        if (data.column.index === 3) data.cell.styles.textColor = GREEN;
      },
    });

    addFooter();
    doc.save(`Finance_Report_${activeRange}_${U.today()}.pdf`);
    U.toast('PDF report downloaded');
  } catch (err) {
    console.error(err);
    U.toast('Could not generate PDF', 'error');
  } finally {
    U.loading(btn, false);
  }
}

(async () => {
if (!(await Auth.requireSession())) return;
buildLayout('Reports');
document.getElementById('exportPdfBtn').addEventListener('click', exportToPDF);
document.querySelectorAll('[data-range]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-range]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRange = btn.dataset.range;
    const cr = document.getElementById('customRange');
    cr.style.display = activeRange === 'custom' ? 'flex' : 'none';
    if (activeRange !== 'custom') {
      applyRange(activeRange); load();
    }
  });
});

document.getElementById('dateFrom').addEventListener('change', e => dateFrom = e.target.value);
document.getElementById('dateTo').addEventListener('change',   e => dateTo   = e.target.value);
load();
})();
</script>
</body>
