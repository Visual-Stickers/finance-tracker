<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login – Finance Command Center</title>
<link rel="stylesheet" href="assets/css/app.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-brand-icon"><i class="fa fa-chart-line"></i></div>
      <div class="login-brand-name">Finance Command Center</div>
    </div>
    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" id="tab-signin" onclick="showTab('signin')">Sign In</button>
        <button class="login-tab" id="tab-signup" onclick="showTab('signup')">Create Account</button>
      </div>
      <div id="msg-error"   class="login-error"></div>
      <div id="msg-success" class="login-success"></div>

      <!-- Sign In -->
      <div id="form-signin">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" id="si-email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" id="si-pass" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center" id="btn-signin" onclick="doSignIn()">
          <i class="fa fa-arrow-right-to-bracket"></i> Sign In
        </button>
        <div style="text-align:center;margin-top:12px">
          <a href="#" onclick="showTab('forgot');return false" style="font-size:12px;color:var(--blue)">Forgot password?</a>
        </div>
      </div>

      <!-- Sign Up -->
      <div id="form-signup" style="display:none">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" id="su-email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password (min 6 chars)</label>
          <input class="form-control" id="su-pass" type="password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-control" id="su-pass2" type="password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn btn-success" style="width:100%;justify-content:center" id="btn-signup" onclick="doSignUp()">
          <i class="fa fa-user-plus"></i> Create Account
        </button>
      </div>

      <!-- Forgot -->
      <div id="form-forgot" style="display:none">
        <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Enter your email to receive a reset link.</p>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" id="fp-email" type="email" placeholder="you@example.com">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center" id="btn-forgot" onclick="doForgot()">
          <i class="fa fa-paper-plane"></i> Send Reset Link
        </button>
        <div style="text-align:center;margin-top:12px">
          <a href="#" onclick="showTab('signin');return false" style="font-size:12px;color:var(--blue)">← Back to Sign In</a>
        </div>
      </div>
    </div>
    <div class="login-footer">Your data is securely stored in Supabase</div>
  </div>
</div>
<script>
// Redirect if already logged in
(async () => {
  const user = await Auth.getUser();
  if (user) {
    const base = location.pathname.replace(/\/[^/]*$/, '/');
    location.href = base + 'index.html';
  }
})();

function showTab(tab) {
  ['signin','signup','forgot'].forEach(t => {
    document.getElementById('form-'+t).style.display = t===tab ? '' : 'none';
    const btn = document.getElementById('tab-'+t);
    if (btn) btn.classList.toggle('active', t===tab);
  });
  clearMsg();
}

function clearMsg() {
  document.getElementById('msg-error').style.display = 'none';
  document.getElementById('msg-success').style.display = 'none';
}

function showErr(msg) {
  const el = document.getElementById('msg-error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('msg-success').style.display = 'none';
}

function showOk(msg) {
  const el = document.getElementById('msg-success');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('msg-error').style.display = 'none';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  if (loading) { btn._orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Please wait...'; }
  else if (btn._orig) btn.innerHTML = btn._orig;
}

async function doSignIn() {
  clearMsg();
  const email = document.getElementById('si-email').value.trim();
  const pass  = document.getElementById('si-pass').value;
  if (!email || !pass) { showErr('Please enter email and password.'); return; }
  setLoading('btn-signin', true);
  try {
    await Auth.signIn(email, pass);
    const base = location.pathname.replace(/\/[^/]*$/, '/');
    location.href = base + 'index.html';
  } catch(e) {
    showErr(e.message || 'Sign in failed.');
    setLoading('btn-signin', false);
  }
}

async function doSignUp() {
  clearMsg();
  const email = document.getElementById('su-email').value.trim();
  const pass  = document.getElementById('su-pass').value;
  const pass2 = document.getElementById('su-pass2').value;
  if (!email || !pass) { showErr('Please fill all fields.'); return; }
  if (pass.length < 6)  { showErr('Password must be at least 6 characters.'); return; }
  if (pass !== pass2)   { showErr('Passwords do not match.'); return; }
  setLoading('btn-signup', true);
  try {
    await Auth.signUp(email, pass);
    showOk('Account created! Check your email to confirm, then sign in.');
    setLoading('btn-signup', false);
  } catch(e) {
    showErr(e.message || 'Sign up failed.');
    setLoading('btn-signup', false);
  }
}

async function doForgot() {
  clearMsg();
  const email = document.getElementById('fp-email').value.trim();
  if (!email) { showErr('Enter your email address.'); return; }
  setLoading('btn-forgot', true);
  try {
    await Auth.resetPassword(email);
    showOk('Reset link sent! Check your email.');
    setLoading('btn-forgot', false);
  } catch(e) {
    showErr(e.message || 'Failed to send reset link.');
    setLoading('btn-forgot', false);
  }
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('form-signin').style.display !== 'none') doSignIn();
  else if (document.getElementById('form-signup').style.display !== 'none') doSignUp();
  else if (document.getElementById('form-forgot').style.display !== 'none') doForgot();
});
</script>
</body>
</html>
