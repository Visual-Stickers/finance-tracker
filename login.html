<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Finance Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body.auth-body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg);
    }
    .auth-wrap { width: 100%; max-width: 380px; padding: 20px; }
    .auth-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 22px; }
    .auth-brand .brand-icon { width: 52px; height: 52px; font-size: 22px; }
    .auth-brand-name { font-weight: 700; font-size: 18px; color: var(--text); }
    .auth-tabs { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
    .auth-tabs button {
      flex: 1; padding: 10px; border: none; background: var(--surface); color: var(--text2);
      font-weight: 600; font-size: 13px; cursor: pointer;
    }
    .auth-tabs button.active { background: var(--blue); color: #fff; }
    .auth-alert { font-size: 12px; border-radius: var(--radius); padding: 9px 12px; margin-bottom: 12px; }
    .auth-alert.error   { background: var(--red-light);   color: var(--red); }
    .auth-alert.success { background: var(--green-light); color: var(--green); }
    .auth-foot { text-align: center; margin-top: 14px; }
    .auth-foot a { color: var(--blue); font-size: 12px; text-decoration: none; cursor: pointer; }
    .auth-sub { text-align: center; color: var(--text3); font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body class="auth-body">

<div class="auth-wrap">
  <div class="auth-brand">
    <div class="brand-icon"><i class="fa-solid fa-indian-rupee-sign"></i></div>
    <div class="auth-brand-name">Finance Tracker</div>
  </div>

  <div class="card card-pad">
    <div class="auth-tabs">
      <button id="tabSignIn" class="active" onclick="switchTab('signin')">Sign In</button>
      <button id="tabSignUp" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="authAlert"></div>

    <!-- Sign In -->
    <form id="signinForm" onsubmit="return handleSignIn(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="siEmail" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="siPassword" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="siBtn">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
      </button>
      <div class="auth-foot"><a onclick="switchTab('forgot')">Forgot password?</a></div>
    </form>

    <!-- Sign Up -->
    <form id="signupForm" style="display:none" onsubmit="return handleSignUp(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="suEmail" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password (min 6 characters)</label>
        <input type="password" class="form-control" id="suPassword" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="suPassword2" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-success" style="width:100%;justify-content:center" id="suBtn">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
    </form>

    <!-- Forgot password -->
    <form id="forgotForm" style="display:none" onsubmit="return handleForgot(event)">
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Enter your email and we'll send you a reset link.</p>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="fpEmail" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="fpBtn">
        <i class="fa-solid fa-paper-plane"></i> Send Reset Link
      </button>
      <div class="auth-foot"><a onclick="switchTab('signin')">← Back to Sign In</a></div>
    </form>
  </div>

  <div class="auth-sub">Your data is securely stored in Supabase</div>
</div>

<script src="js/config.js"></script>
<script>
function switchTab(tab) {
  document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('forgotForm').style.display = tab === 'forgot' ? 'block' : 'none';
  document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
  document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
  document.getElementById('authAlert').innerHTML = '';
}

function showAlert(msg, type = 'error') {
  document.getElementById('authAlert').innerHTML = `<div class="auth-alert ${type}">${msg}</div>`;
}

function setLoading(btn, on, label, icon) {
  if (on) { btn.dataset.orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true; }
  else    { btn.innerHTML = btn.dataset.orig; btn.disabled = false; }
}

async function handleSignIn(e) {
  e.preventDefault();
  const email = document.getElementById('siEmail').value.trim();
  const password = document.getElementById('siPassword').value;
  const btn = document.getElementById('siBtn');
  setLoading(btn, true);
  const { error } = await Auth.signIn(email, password);
  setLoading(btn, false);
  if (error) { showAlert(error.message); return false; }
  location.href = 'index.html';
  return false;
}

async function handleSignUp(e) {
  e.preventDefault();
  const email = document.getElementById('suEmail').value.trim();
  const password = document.getElementById('suPassword').value;
  const password2 = document.getElementById('suPassword2').value;
  if (password.length < 6) { showAlert('Password must be at least 6 characters.'); return false; }
  if (password !== password2) { showAlert('Passwords do not match.'); return false; }
  const btn = document.getElementById('suBtn');
  setLoading(btn, true);
  const { error } = await Auth.signUp(email, password);
  setLoading(btn, false);
  if (error) { showAlert(error.message); return false; }
  showAlert('Account created! Check your email to confirm, then sign in.', 'success');
  switchTabKeepAlert('signin');
  return false;
}

function switchTabKeepAlert(tab) {
  const alertHTML = document.getElementById('authAlert').innerHTML;
  switchTab(tab);
  document.getElementById('authAlert').innerHTML = alertHTML;
}

async function handleForgot(e) {
  e.preventDefault();
  const email = document.getElementById('fpEmail').value.trim();
  const btn = document.getElementById('fpBtn');
  setLoading(btn, true);
  const { error } = await Auth.resetPassword(email);
  setLoading(btn, false);
  if (error) { showAlert(error.message); return false; }
  showAlert('Reset link sent! Check your email.', 'success');
  return false;
}

// If already signed in, skip straight to the dashboard.
Auth.getSession().then(session => { if (session) location.href = 'index.html'; });
</script>
</body>
</html>
