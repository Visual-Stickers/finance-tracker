<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loans – Finance Command Center</title>
<link rel="stylesheet" href="assets/css/app.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand"><div class="nav-brand-icon"><i class="fa fa-chart-line"></i></div><span>Finance Command Center</span></a>
  <ul class="nav-links">
    <li><a href="index.html"><i class="fa fa-gauge-high"></i><span>Dashboard</span></a></li>
    <li><a href="income-expense.html"><i class="fa fa-arrows-left-right"></i><span>Income &amp; Expense</span></a></li>
    <li><a href="loans.html" class="active"><i class="fa fa-landmark"></i><span>Loans</span></a></li>
    <li><a href="credit-cards.html"><i class="fa fa-credit-card"></i><span>Credit Cards</span></a></li>
    <li><a href="reports.html"><i class="fa fa-chart-pie"></i><span>Reports</span></a></li>
    <li><a href="settings.html"><i class="fa fa-gear"></i><span>Settings</span></a></li>
  </ul>
  <div class="nav-right">
    <span class="nav-date" id="navDate"></span>
    <button class="btn-theme" id="themeToggle" onclick="Theme.toggle()"></button>
    <button class="btn-signout" onclick="Auth.signOut()"><i class="fa fa-right-from-bracket"></i> Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
    <div><h1><i class="fa fa-landmark" style="color:var(--red)"></i> Loans</h1><p>Track your loan EMIs and repayment progress.</p></div>
    <button class="btn btn-primary" onclick="openLoanModal()"><i class="fa fa-plus"></i> Add Loan</button>
  </div>
  <div id="loanList"></div>
</div>

<!-- Loan Modal (Add/Edit) -->
<div class="modal-overlay" id="loanModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="loan-modal-title">Add Loan</div>
      <button class="modal-close" onclick="Utils.closeModal('loanModal')">×</button>
    </div>
    <input type="hidden" id="lm-id">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Loan Name *</label><input class="form-control" id="lm-name" placeholder="e.g. HDFC Personal Loan"></div>
      <div class="form-group"><label class="form-label">Bank</label><input class="form-control" id="lm-bank" placeholder="e.g. HDFC Bank"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Principal Amount (₹) *</label><input class="form-control" id="lm-principal" type="number" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Outstanding (₹)</label><input class="form-control" id="lm-outstanding" type="number" placeholder="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Monthly EMI (₹) *</label><input class="form-control" id="lm-emi" type="number" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Interest Rate (% p.a.)</label><input class="form-control" id="lm-rate" type="number" placeholder="0" step="0.01"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tenure (months)</label><input class="form-control" id="lm-tenure" type="number" placeholder="0"></div>
      <div class="form-group"><label class="form-label">EMIs Paid</label><input class="form-control" id="lm-paid" type="number" placeholder="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Next EMI Date</label><input class="form-control" id="lm-emi-date" type="date"></div>
      <div class="form-group"><label class="form-label">End Date</label><input class="form-control" id="lm-end" type="date"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Utils.closeModal('loanModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveLoan()"><i class="fa fa-check"></i> Save Loan</button>
    </div>
  </div>
</div>

<!-- EMI Modal -->
<div class="modal-overlay" id="emiModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="emi-loan-name">Mark EMI Paid</div>
      <button class="modal-close" onclick="Utils.closeModal('emiModal')">×</button>
    </div>
    <input type="hidden" id="emi-loan-id">
    <div class="form-group"><label class="form-label">Planned EMI</label><input class="form-control" id="emi-planned" readonly></div>
    <div class="form-group"><label class="form-label">Actual Amount Paid (₹)</label><input class="form-control" id="emi-actual" type="number"></div>
    <div class="form-group"><label class="form-label">Date</label><input class="form-control" id="emi-date" type="date"></div>
    <div class="form-group"><label class="form-label">Note (optional)</label><input class="form-control" id="emi-note" placeholder="e.g. Auto debit"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Utils.closeModal('emiModal')">Cancel</button>
      <button class="btn btn-success" onclick="saveEmi()"><i class="fa fa-check"></i> Confirm Payment</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/theme.js"></script>
<script src="assets/js/storage.js"></script>
<script>
let _user, _loans = [];

document.addEventListener('DOMContentLoaded', async () => {
  _user = await Auth.requireAuth(); if (!_user) return;
  Theme.init();
  document.getElementById('navDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  await DB.seed(_user.id);
  await renderLoans();
});

async function renderLoans() {
  _loans = await DB.getLoans(_user.id);
  const el = document.getElementById('loanList');
  if (!_loans.length) {
    el.innerHTML = `<div class="empty" style="padding:60px"><i class="fa fa-landmark"></i><p>No loans yet. Add your first loan to track EMIs.</p></div>`;
    return;
  }
  el.innerHTML = _loans.map(l => {
    const pct = l.principal ? Math.min(100,Math.round(((l.principal-l.outstanding)/l.principal)*100)) : 0;
    const hist = (l.paymentHistory||[]).slice(-3).reverse();
    return `
    <div class="loan-card">
      <div class="loan-card-head">
        <div><div class="loan-card-name">${l.name}</div><div class="loan-card-bank"><i class="fa fa-building-columns"></i> ${l.bank||'—'}</div></div>
        <span class="badge badge-red"><i class="fa fa-percent"></i> ${l.interestRate||0}% p.a.</span>
      </div>
      <div class="loan-stats">
        <div><div class="loan-stat-label">Principal</div><div class="loan-stat-value">${Utils.currency(l.principal)}</div></div>
        <div><div class="loan-stat-label">Outstanding</div><div class="loan-stat-value" style="color:var(--red)">${Utils.currency(l.outstanding)}</div></div>
        <div><div class="loan-stat-label">Monthly EMI</div><div class="loan-stat-value" style="color:var(--blue)">${Utils.currency(l.emi)}</div></div>
        <div><div class="loan-stat-label">EMIs Paid</div><div class="loan-stat-value">${l.emisPaid||0} / ${l.tenure||0}</div></div>
        <div><div class="loan-stat-label">Remaining</div><div class="loan-stat-value">${l.emisRemaining||0} EMIs</div></div>
        <div><div class="loan-stat-label">End Date</div><div class="loan-stat-value" style="font-size:13px">${Utils.shortDate(l.endDate)}</div></div>
      </div>
      <div class="loan-card-prog">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px">
          <span>${pct}% paid off</span><span style="color:var(--red)">${Utils.currency(l.outstanding)} remaining</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--green),var(--blue))"></div></div>
      </div>
      ${hist.length ? `<div style="padding:12px 20px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">Recent Payments</div>
        ${hist.map(h=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--text2)"><span>${Utils.shortDate(h.date)}</span><span>${h.note||'EMI'}</span><span style="color:var(--green)">${Utils.currency(h.amount)}</span></div>`).join('')}
      </div>` : ''}
      <div class="loan-card-foot">
        <div style="font-size:12px;color:var(--text3)"><i class="fa fa-calendar-day"></i> Next EMI: ${Utils.shortDate(l.emiStartDate)} · ${Utils.currency(l.emi)}</div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="openEditLoan('${l._id}')"><i class="fa fa-pen"></i> Edit</button>
          <button class="btn btn-primary btn-sm" onclick="openEmiModal('${l._id}')"><i class="fa fa-check"></i> Mark EMI Paid</button>
          <button class="btn btn-danger btn-sm" onclick="deleteLoan('${l._id}')"><i class="fa fa-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openLoanModal(loan) {
  document.getElementById('loan-modal-title').textContent = loan ? 'Edit Loan' : 'Add Loan';
  document.getElementById('lm-id').value          = loan?._id || '';
  document.getElementById('lm-name').value        = loan?.name || '';
  document.getElementById('lm-bank').value        = loan?.bank || '';
  document.getElementById('lm-principal').value   = loan?.principal || '';
  document.getElementById('lm-outstanding').value = loan?.outstanding || '';
  document.getElementById('lm-emi').value         = loan?.emi || '';
  document.getElementById('lm-rate').value        = loan?.interestRate || '';
  document.getElementById('lm-tenure').value      = loan?.tenure || '';
  document.getElementById('lm-paid').value        = loan?.emisPaid || '';
  document.getElementById('lm-emi-date').value    = loan?.emiStartDate || '';
  document.getElementById('lm-end').value         = loan?.endDate || '';
  Utils.openModal('loanModal');
}

function openEditLoan(id) {
  const loan = _loans.find(l => l._id === id);
  if (loan) openLoanModal(loan);
}

async function saveLoan() {
  const name = document.getElementById('lm-name').value.trim();
  const emi  = parseFloat(document.getElementById('lm-emi').value);
  const prin = parseFloat(document.getElementById('lm-principal').value);
  if (!name || isNaN(emi) || isNaN(prin)) { Utils.toast('Name, Principal and EMI are required','error'); return; }
  const id  = document.getElementById('lm-id').value;
  const ten = parseInt(document.getElementById('lm-tenure').value)||0;
  const paid = parseInt(document.getElementById('lm-paid').value)||0;
  const loan = {
    _id: id || null, id: id ? (_loans.find(l=>l._id===id)?.id || 'loan_'+Date.now()) : 'loan_'+Date.now(),
    name, bank: document.getElementById('lm-bank').value.trim(),
    principal: prin,
    outstanding: parseFloat(document.getElementById('lm-outstanding').value) || prin,
    emi, interestRate: parseFloat(document.getElementById('lm-rate').value)||0,
    tenure: ten, emisPaid: paid, emisRemaining: ten-paid,
    emiStartDate: document.getElementById('lm-emi-date').value,
    endDate: document.getElementById('lm-end').value,
    paymentHistory: id ? (_loans.find(l=>l._id===id)?.paymentHistory||[]) : []
  };
  const ok = await DB.saveLoan(_user.id, loan);
  if (!ok) { Utils.toast('Failed to save loan','error'); return; }
  Utils.closeModal('loanModal'); Utils.toast(id?'Loan updated!':'Loan added!'); await renderLoans();
}

function openEmiModal(id) {
  const loan = _loans.find(l => l._id === id); if (!loan) return;
  document.getElementById('emi-loan-name').textContent = 'Mark EMI — ' + loan.name;
  document.getElementById('emi-loan-id').value  = id;
  document.getElementById('emi-planned').value  = Utils.currency(loan.emi);
  document.getElementById('emi-actual').value   = loan.emi;
  document.getElementById('emi-date').value     = new Date().toISOString().split('T')[0];
  document.getElementById('emi-note').value     = '';
  Utils.openModal('emiModal');
}

async function saveEmi() {
  const id   = document.getElementById('emi-loan-id').value;
  const loan = _loans.find(l => l._id === id); if (!loan) return;
  const amount = parseFloat(document.getElementById('emi-actual').value);
  if (isNaN(amount)||amount<=0) { Utils.toast('Enter a valid amount','error'); return; }
  const mi = (loan.interestRate||0)/100/12;
  const interest  = (loan.outstanding||0) * mi;
  const principal = Math.max(0, amount - interest);
  loan.outstanding  = Math.max(0, (loan.outstanding||0) - principal);
  loan.emisPaid     = (loan.emisPaid||0) + 1;
  loan.emisRemaining = Math.max(0, (loan.emisRemaining||0) - 1);
  loan.paymentHistory = loan.paymentHistory||[];
  loan.paymentHistory.push({ date: document.getElementById('emi-date').value, amount, note: document.getElementById('emi-note').value });
  const d = new Date(loan.emiStartDate||new Date());
  d.setMonth(d.getMonth()+1); loan.emiStartDate = d.toISOString().split('T')[0];
  await DB.saveLoan(_user.id, loan);
  Utils.closeModal('emiModal'); Utils.toast('EMI payment recorded!'); await renderLoans();
}

async function deleteLoan(id) {
  if (!confirm('Delete this loan? This cannot be undone.')) return;
  await DB.deleteLoan(_user.id, id); Utils.toast('Loan deleted'); await renderLoans();
}
</script>
</body>
</html>
