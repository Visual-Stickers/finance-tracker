<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand">
    <div class="brand-icon"><i class="fa-solid fa-chart-line"></i></div>
    <span class="brand-name">Finance Command Center</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a></li>
    <li><a href="income-expense.html"><i class="fa-solid fa-arrows-left-right"></i><span>Income & Expense</span></a></li>
    <li><a href="loans.html"><i class="fa-solid fa-landmark"></i><span>Loans</span></a></li>
    <li><a href="credit-cards.html" class="active"><i class="fa-solid fa-credit-card"></i><span>Credit Cards</span></a></li>
    <li><a href="reports.html"><i class="fa-solid fa-chart-pie"></i><span>Reports</span></a></li>
    <li><a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a></li>
  </ul>
  <span class="nav-date" id="navDate"></span>
</nav>

<div class="page">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div>
      <h1><i class="fa-solid fa-credit-card" style="color:var(--accent-teal);font-size:22px"></i> Credit Cards</h1>
      <p>Manage your credit card balances and payments.</p>
    </div>
    <button class="btn btn-primary" onclick="openAddCardModal()">
      <i class="fa-solid fa-plus"></i> Add Card
    </button>
  </div>

  <div id="cardGrid" class="grid-3"></div>
</div>

<!-- Add Card Modal -->
<div class="modal-overlay" id="addCardModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div class="modal-title"><i class="fa-solid fa-credit-card" style="color:var(--accent-teal)"></i> Add Credit Card</div>
      <button class="modal-close" onclick="Utils.closeModal('addCardModal')">&times;</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Card Name</label>
        <input class="form-control" id="cc-name" placeholder="e.g. HDFC Regalia">
      </div>
      <div class="form-group">
        <label class="form-label">Bank</label>
        <input class="form-control" id="cc-bank" placeholder="e.g. HDFC">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Credit Limit (₹)</label>
        <input class="form-control" type="number" id="cc-limit" placeholder="100000">
      </div>
      <div class="form-group">
        <label class="form-label">Outstanding (₹)</label>
        <input class="form-control" type="number" id="cc-outstanding" placeholder="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Statement Date</label>
        <input class="form-control" type="number" id="cc-stmt-date" placeholder="15" min="1" max="31">
      </div>
      <div class="form-group">
        <label class="form-label">Due Date (day of month)</label>
        <input class="form-control" type="number" id="cc-due-date" placeholder="5" min="1" max="31">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Minimum Due (₹)</label>
      <input class="form-control" type="number" id="cc-min-due" placeholder="500">
    </div>
    <div class="form-group">
      <label class="form-label">Card Gradient</label>
      <select class="form-control form-select" id="cc-color">
        <option value="blue">Blue</option>
        <option value="teal">Teal</option>
        <option value="purple">Purple</option>
        <option value="red">Red</option>
        <option value="green">Green</option>
        <option value="orange">Orange</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="Utils.closeModal('addCardModal')">Cancel</button>
      <button class="btn btn-primary" id="cc-save"><i class="fa-solid fa-plus"></i> Add Card</button>
    </div>
  </div>
</div>

<!-- Pay Modal -->
<div class="modal-overlay" id="payModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title"><i class="fa-solid fa-money-bill-wave" style="color:var(--accent-green)"></i> Make Payment</div>
      <button class="modal-close" onclick="Utils.closeModal('payModal')">&times;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Card</label>
      <input class="form-control" id="pay-card-name" readonly>
    </div>
    <div class="form-group">
      <label class="form-label">Outstanding</label>
      <input class="form-control" id="pay-outstanding" readonly>
    </div>
    <div class="form-group">
      <label class="form-label">Payment Amount (₹)</label>
      <input class="form-control" type="number" id="pay-amount" placeholder="Enter amount">
    </div>
    <div class="form-group">
      <label class="form-label">Payment Date</label>
      <input class="form-control" type="date" id="pay-date">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input class="form-control" id="pay-note" placeholder="Full payment, minimum due, etc.">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="Utils.closeModal('payModal')">Cancel</button>
      <button class="btn btn-success" id="pay-save"><i class="fa-solid fa-check"></i> Confirm Payment</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/creditcard.js"></script>
</body>
</html>
